services:
  frontend:
    build:
      context: ./frontend
      target: development
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - frontend-net
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      target: development
      args:
        NODE_PORT: 3000
    container_name: backend
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - frontend-net
      - backend-net
    depends_on:
      - mongo

  mongo:
    image: mongo:4.2.0
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - backend-net

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

volumes:
  mongo-data:
